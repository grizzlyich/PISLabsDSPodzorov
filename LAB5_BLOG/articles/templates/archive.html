    {% load static %}
    <!DOCTYPE html>
    <html>
    <head>
        <title>Архив всех статей</title>
        <link rel="stylesheet" href="{% static 'css/archive.css' %}">
    </head>
    <body>
    <div class="header">
    <a href="{% url 'archive' %}">
        <img src="{% static 'img/dpb-logo.png' %}" alt="logo">
    </a>
</div>

    <div class="archive">
        {% for post in posts %}
            <div class="one-post">

                    <h2 class="post-title"><a href="{% url 'get_article' article_id=post.id %}">{{ post.title }}</a></h2>


                <div class="article-info">
                    <div class="article-author">{{ post.author.username }}</div>
                    <div class="article-created-date">{{ post.created_date }}</div>
                </div>
                <p class="article-text">{{ post.get_excerpt }}</p>

            </div>
        {% endfor %}
        {% if request.user.is_authenticated %}<a class="all-posts-link" href="{% url 'create_post' %}">Новая запись</a>{% endif %}
    </div>

    </body>
    </html>
