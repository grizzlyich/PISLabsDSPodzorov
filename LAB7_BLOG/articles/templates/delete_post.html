{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Удалить статью</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body>

<div class="header">
    <a href="{% url 'archive' %}">
        <img src="{% static 'img/dpb-logo.png' %}" alt="logo">
    </a>
    <a class="all-posts-link" href="{% url 'get_article' article_id=post.id %}">Назад к статье</a>
</div>

<div class="content">
    <h1 class="title">Подтверждение удаления</h1>

    <p>Ты действительно хочешь удалить статью:</p>
    <p><b>{{ post.title }}</b> ?</p>
    <p style="color:#b00020;"><b>Это действие нельзя отменить.</b></p>

    <form method="post" class="form">
        {% csrf_token %}
        <button class="btn danger" type="submit">Да, удалить</button>
        <a class="btn light" href="{% url 'get_article' article_id=post.id %}">Нет, назад</a>
    </form>
</div>

</body>
</html>
