{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
<div class="auth-wrap">
    <h1>Вход</h1>
    <form method="post">
        {% csrf_token %}
        <label>Логин</label>
        <input type="text" name="username" value="{{ username|default_if_none:'' }}">
        <label>Пароль</label>
        <input type="password" name="password">
        <button type="submit">Войти</button>
    </form>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <p><a href="{% url 'register' %}">Регистрация</a></p>
    <p><a href="{% url 'archive' %}">На главную</a></p>
</div>
</body>
</html>
